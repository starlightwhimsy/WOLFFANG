name: Build WOLFFANG EXE
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Compile WOLFFANG
        run: g++ -O3 wolffang.cpp -o wolffang.exe
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wolffang-exe
          path: wolffang.exe
      
