name: Build WOLFFANG EXE
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Compile WOLFFANG
        run: g++ -O3 wolffang.cpp -o wolffang.exe
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: wolffang-exe
          path: wolffang.exe
